<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>DayFrame</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --purple:#534AB7;--purple-light:rgba(83,74,183,0.12);--purple-border:rgba(83,74,183,0.35);
    --bg:#f5f5f0;--card:#ffffff;--border:rgba(0,0,0,0.12);--border-med:rgba(0,0,0,0.22);
    --text:#1a1a1a;--text2:#666;--text3:#aaa;
    --warn-bg:#faeeda;--warn-border:rgba(186,117,23,0.35);--warn-text:#854f0b;
    --success-bg:#eaf3de;--success-text:#3b6d11;
    --danger-bg:#fcebeb;--danger-text:#a32d2d;--danger-border:rgba(163,45,45,0.3);
    --surface:#f0f0ea;--radius:12px;--radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#111;--card:#1e1e1e;--border:rgba(255,255,255,0.1);--border-med:rgba(255,255,255,0.2);
      --text:#f0f0ea;--text2:#999;--text3:#555;--surface:#2a2a2a;
      --warn-bg:rgba(186,117,23,0.15);--warn-text:#e8b050;
      --success-bg:rgba(59,109,17,0.2);--success-text:#9fd460;
      --danger-bg:rgba(163,45,45,0.2);--danger-text:#f09595;
    }
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  #header{background:var(--purple);padding:16px 18px 0;position:sticky;top:0;z-index:50}
  #header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  #app-title{font-size:20px;font-weight:500;color:#fff;letter-spacing:-0.3px}
  #app-date{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px}
  #end-day-btn{background:rgba(255,255,255,0.15);border:0.5px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit}
  #tabs{display:flex}
  .tab-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,0.5);border-radius:0;font-weight:400;padding:8px 0 12px;font-size:14px;cursor:pointer;font-family:inherit;transition:color 0.15s}
  .tab-btn.active{border-bottom-color:#fff;color:#fff;font-weight:500}
  #main{flex:1;padding:18px 16px 100px}
  .card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 16px}
  .surface{background:var(--surface);border-radius:var(--radius-sm);padding:10px 14px}
  .label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:5px}
  input,textarea,select{font-family:inherit;font-size:14px;color:var(--text);background:var(--card);border:0.5px solid var(--border-med);border-radius:var(--radius-sm);padding:9px 12px;width:100%;outline:none;-webkit-appearance:none;appearance:none}
  input:focus,textarea:focus{border-color:var(--purple);box-shadow:0 0 0 2px var(--purple-light)}
  textarea{resize:vertical}
  input[type=checkbox]{width:auto;margin:0}
  button{font-family:inherit;cursor:pointer;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;background:var(--card);color:var(--text);transition:background 0.15s}
  button:active{opacity:0.8}
  button:disabled{opacity:0.35;cursor:not-allowed}
  .btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
  .btn-danger{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border)}
  .btn-sm{padding:5px 11px;font-size:12px}
  .btn-full{width:100%;padding:12px;font-size:15px}
  .alert-warn{background:var(--warn-bg);border:0.5px solid var(--warn-border);border-radius:var(--radius-sm);padding:9px 14px;font-size:13px;color:var(--warn-text);margin-bottom:14px}
  .entry-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:9px;transition:opacity 0.15s,border-color 0.15s}
  .entry-card.checked{opacity:0.55;border-color:var(--purple-border)}
  .entry-row{display:flex;align-items:center;gap:12px}
  .check-box{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-med);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
  .check-box.checked{background:var(--purple);border-color:var(--purple)}
  .entry-desc{font-size:14px;font-weight:500}
  .entry-desc.checked{text-decoration:line-through;color:var(--text2)}
  .entry-time{font-size:12px;color:var(--text3);margin-top:1px}
  .log-btn{font-size:11px;padding:5px 11px;background:var(--purple-light);border:0.5px solid var(--purple-border);color:var(--purple);flex-shrink:0;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit}
  .last-entry{margin-top:9px;padding:7px 10px;background:var(--purple-light);border-radius:7px;font-size:12px;color:var(--text2)}
  .tpl-option{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 16px;cursor:pointer;margin-bottom:10px;transition:border-color 0.15s}
  .tpl-option.selected{border-color:var(--purple)}
  .check-circle{width:20px;height:20px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .entry-builder{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 13px;margin-bottom:10px}
  .add-entry-btn{border:1px dashed var(--border-med);border-radius:var(--radius);padding:11px;font-size:13px;color:var(--text2);background:transparent;width:100%;cursor:pointer;font-family:inherit;margin-bottom:14px}
  .pill{font-size:10px;background:var(--purple-light);color:var(--purple);padding:2px 7px;border-radius:100px;font-weight:500;flex-shrink:0}
  .log-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .log-tab{font-size:13px;padding:7px 14px;background:transparent;border:0.5px solid var(--border);color:var(--text2);text-transform:capitalize;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit}
  .log-tab.active{background:var(--purple-light);border-color:var(--purple-border);color:var(--purple)}
  #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
  #modal-overlay.open{display:flex}
  #modal-box{background:var(--card);border-radius:14px;padding:22px;max-width:360px;width:100%}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .empty{font-size:14px;color:var(--text2);text-align:center;padding:40px 0}
  .pct-badge{font-size:12px;padding:3px 9px;border-radius:100px;font-weight:500}
  .hist-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div id="header-top">
      <div>
        <div id="app-title">DayFrame</div>
        <div id="app-date"></div>
      </div>
      <button id="end-day-btn" style="display:none" onclick="endDay()">End day</button>
    </div>
    <div id="tabs">
      <button class="tab-btn active" onclick="switchTab('today')">Today</button>
      <button class="tab-btn" onclick="switchTab('templates')">Templates</button>
      <button class="tab-btn" onclick="switchTab('logs')">Logs</button>
    </div>
  </header>
  <main id="main"></main>
</div>
<div id="modal-overlay" onclick="closeModalOnBg(event)">
  <div id="modal-box"></div>
</div>

<script>
// Storage
const KEYS={tpl:'df_templates',log:'df_daily',hist:'df_history',tracked:'df_tracked'};
const load=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){alert('Storage error: '+e.message)}};
const uid=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const esc=s=>s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const tableKey=t=>(t||'').trim().toLowerCase().replace(/\s+/g,'_');

// State
let templates=load(KEYS.tpl)||defaultTemplates();
let dailyLog=load(KEYS.log)||null;
let history=load(KEYS.hist)||[];
let tracked=load(KEYS.tracked)||{};
let activeTab='today';
let editingTplId=null;
let editorEntries=[];
let activeLogTab='history';
let startStep=1,startSelTpl='',startGoal='',startFreeTime='',startWarned=false;
let confirmCb=null;

function defaultTemplates(){
  return[
    {id:'tpl_weekday',name:'Weekday',entries:[
      {id:uid(),time:'7:00 AM',desc:'Wake up & morning routine',tracked:false,trackTable:''},
      {id:uid(),time:'8:00 AM',desc:'Breakfast',tracked:false,trackTable:''},
      {id:uid(),time:'9:00 AM',desc:'Commute',tracked:false,trackTable:''},
      {id:uid(),time:'12:00 PM',desc:'Lunch',tracked:false,trackTable:''},
      {id:uid(),time:'6:00 PM',desc:'Workout',tracked:true,trackTable:'Workouts'},
      {id:uid(),time:'7:30 PM',desc:'Dinner',tracked:false,trackTable:''},
      {id:uid(),time:'9:00 PM',desc:'Wind down',tracked:false,trackTable:''},
    ]},
    {id:'tpl_weekend',name:'Weekend',entries:[
      {id:uid(),time:'8:30 AM',desc:'Wake up slow',tracked:false,trackTable:''},
      {id:uid(),time:'10:00 AM',desc:'Workout',tracked:true,trackTable:'Workouts'},
      {id:uid(),time:'12:00 PM',desc:'Brunch',tracked:false,trackTable:''},
      {id:uid(),time:'3:00 PM',desc:'Errands / chores',tracked:false,trackTable:''},
      {id:uid(),time:'7:00 PM',desc:'Dinner',tracked:false,trackTable:''},
    ]}
  ];
}

if(!startSelTpl&&templates.length>0) startSelTpl=templates[0].id;

const CHECK_SVG=`<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 4L4 7L10 1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const CIRCLE_CHECK=`<div class="check-circle">${CHECK_SVG}</div>`;

function switchTab(tab){
  activeTab=tab;editingTplId=null;editorEntries=[];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['today','templates','logs'][i]===tab));
  render();
}

function render(){
  document.getElementById('app-date').textContent=fmtDate(todayStr());
  document.getElementById('end-day-btn').style.display=dailyLog?'block':'none';
  const main=document.getElementById('main');
  if(activeTab==='today') main.innerHTML=dailyLog?rToday():rStartDay();
  else if(activeTab==='templates') main.innerHTML=editingTplId?rEditor():rTemplates();
  else main.innerHTML=rLogs();
}

// ── TODAY ──────────────────────────────────────────────────────────────────
function rToday(){
  const tpl=templates.find(t=>t.id===dailyLog.templateId);
  const entries=tpl?tpl.entries:[];
  const done=entries.filter(e=>dailyLog.checks[e.id]).length;
  const mg=!dailyLog.goal,mf=!dailyLog.freeTime;
  let h=`<div style="display:flex;gap:10px;margin-bottom:16px">
    <div class="surface" style="flex:1"><span class="label">Template</span><div style="font-size:16px;font-weight:500">${esc(dailyLog.templateName)}</div></div>
    <div class="surface" style="flex:1"><span class="label">Progress</span><div style="font-size:16px;font-weight:500" id="prog-display">${done}/${entries.length}</div></div>
  </div>`;
  if(mg||mf) h+=`<div class="alert-warn">⚠ ${mg&&mf?'Daily goal and free-time activity not set.':mg?'Daily goal not set.':'Free-time activity not set.'}</div>`;
  if(dailyLog.goal||dailyLog.freeTime){
    h+=`<div class="card" style="margin-bottom:16px">`;
    if(dailyLog.goal) h+=`<div style="margin-bottom:${dailyLog.freeTime?'10px':'0'}"><span class="label">Daily goal</span><div style="font-size:14px">${esc(dailyLog.goal)}</div></div>`;
    if(dailyLog.freeTime) h+=`<div><span class="label">Free time</span><div style="font-size:14px">${esc(dailyLog.freeTime)}</div></div>`;
    h+=`</div>`;
  }
  entries.forEach(entry=>{
    const checked=!!dailyLog.checks[entry.id];
    const last=entry.tracked?getLastTracked(entry.trackTable):null;
    h+=`<div class="entry-card${checked?' checked':''}" id="ec-${entry.id}">
      <div class="entry-row">
        <div class="check-box${checked?' checked':''}" onclick="toggleCheck('${entry.id}')">${checked?CHECK_SVG:''}</div>
        <div style="flex:1;min-width:0">
          <div class="entry-desc${checked?' checked':''}">${esc(entry.desc)}</div>
          <div class="entry-time">${esc(entry.time)}</div>
        </div>
        ${entry.tracked?`<button class="log-btn" onclick="openTrackModal('${entry.id}')">Log</button>`:''}
      </div>
      ${last?`<div class="last-entry"><strong style="color:var(--purple)">Last:</strong> ${esc(last.note||'(no notes)')} <span style="color:var(--text3)">(${fmtDate(last.date)})</span></div>`:''}
    </div>`;
  });
  if(!entries.length) h+=`<div class="empty">This template has no entries.</div>`;
  return h;
}

function getLastTracked(table){
  const rows=tracked[tableKey(table)];
  return rows&&rows.length?rows[0]:null;
}

function toggleCheck(id){
  if(!dailyLog)return;
  dailyLog.checks[id]=!dailyLog.checks[id];
  save(KEYS.log,dailyLog);
  const tpl=templates.find(t=>t.id===dailyLog.templateId);
  const entries=tpl?tpl.entries:[];
  const checked=dailyLog.checks[id];
  const card=document.getElementById('ec-'+id);
  if(card){
    card.className='entry-card'+(checked?' checked':'');
    const cb=card.querySelector('.check-box');
    cb.className='check-box'+(checked?' checked':'');
    cb.innerHTML=checked?CHECK_SVG:'';
    const desc=card.querySelector('.entry-desc');
    desc.className='entry-desc'+(checked?' checked':'');
  }
  const done=entries.filter(e=>dailyLog.checks[e.id]).length;
  const prog=document.getElementById('prog-display');
  if(prog) prog.textContent=done+'/'+entries.length;
}

// ── START DAY ──────────────────────────────────────────────────────────────
function rStartDay(){return startStep===1?rStep1():rStep2();}

function rStep1(){
  let h=`<div style="font-size:17px;font-weight:500;margin-bottom:4px">Choose today's template</div>
  <div style="font-size:13px;color:var(--text2);margin-bottom:18px">Pick the schedule that best fits your day.</div>`;
  if(!templates.length) h+=`<div class="empty">No templates yet. Go to Templates tab to create one.</div>`;
  templates.forEach(t=>{
    const sel=startSelTpl===t.id;
    const first=t.entries[0]?.time||'',last=t.entries[t.entries.length-1]?.time||'';
    h+=`<div class="tpl-option${sel?' selected':''}" onclick="selectTpl('${t.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:500;font-size:15px">${esc(t.name)}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px">${t.entries.length} entries${first?' · '+first+' – '+last:''}</div>
        </div>
        ${sel?CIRCLE_CHECK:''}
      </div>
    </div>`;
  });
  h+=`<button class="btn-primary btn-full" onclick="goStep2()" ${!startSelTpl||!templates.length?'disabled':''}>Next: Set daily intentions →</button>`;
  return h;
}

function rStep2(){
  let warn='';
  if(startWarned&&(!startGoal.trim()||!startFreeTime.trim())){
    warn=`<div class="alert-warn"><strong>⚠ Reminder — don't skip these!</strong>
      ${!startGoal.trim()?'<div>• Daily goal is empty</div>':''}
      ${!startFreeTime.trim()?'<div>• Free-time activity is empty</div>':''}
      <div style="margin-top:6px;font-size:12px;opacity:0.8">Tap "Start Day" again to proceed anyway.</div>
    </div>`;
  }
  return `<div style="font-size:17px;font-weight:500;margin-bottom:4px">Set your intentions</div>
  <div style="font-size:13px;color:var(--text2);margin-bottom:18px">These guide your day. You can leave them blank, but you'll be reminded.</div>
  ${warn}
  <div style="margin-bottom:14px">
    <label class="label" for="inp-goal">Daily goal</label>
    <input id="inp-goal" type="text" placeholder="e.g. Finish the project proposal..." value="${esc(startGoal)}"/>
  </div>
  <div style="margin-bottom:22px">
    <label class="label" for="inp-free">Free-time activity</label>
    <input id="inp-free" type="text" placeholder="e.g. Read for 30 minutes..." value="${esc(startFreeTime)}"/>
  </div>
  <div style="display:flex;gap:10px">
    <button onclick="goStep1()" style="padding:10px 16px">← Back</button>
    <button class="btn-primary btn-full" onclick="doStartDay()">Start Day</button>
  </div>`;
}

function selectTpl(id){startSelTpl=id;render();}
function goStep2(){startStep=2;render();}
function goStep1(){startStep=1;render();}

function doStartDay(){
  const g=document.getElementById('inp-goal');
  const f=document.getElementById('inp-free');
  if(g) startGoal=g.value.trim();
  if(f) startFreeTime=f.value.trim();
  if(!startWarned&&(!startGoal||!startFreeTime)){startWarned=true;render();return;}
  const tpl=templates.find(t=>t.id===startSelTpl);
  if(!tpl)return;
  dailyLog={date:todayStr(),templateId:tpl.id,templateName:tpl.name,goal:startGoal,freeTime:startFreeTime,checks:{},createdAt:Date.now()};
  startStep=1;startGoal='';startFreeTime='';startWarned=false;
  save(KEYS.log,dailyLog);render();
}

function endDay(){
  if(!dailyLog)return;
  if(!confirm('End today and save to history?'))return;
  history=[dailyLog,...history].slice(0,90);
  dailyLog=null;save(KEYS.log,null);save(KEYS.hist,history);render();
}

// ── TEMPLATES ──────────────────────────────────────────────────────────────
function rTemplates(){
  let h=`<div class="section-header">
    <div style="font-size:17px;font-weight:500">Your templates</div>
    <button class="btn-primary btn-sm" onclick="newTemplate()">+ New</button>
  </div>`;
  if(!templates.length) h+=`<div class="empty">No templates yet. Tap "+ New" to create one.</div>`;
  templates.forEach(t=>{
    const prev=t.entries.slice(0,5).map(e=>`<div style="display:flex;gap:10px;font-size:13px;color:var(--text2);align-items:center;padding:2px 0">
      <span style="min-width:65px;color:var(--text3);font-size:12px">${esc(e.time)}</span>
      <span style="flex:1">${esc(e.desc)}</span>
      ${e.tracked?`<span class="pill">${esc(e.trackTable)}</span>`:''}
    </div>`).join('');
    const more=t.entries.length>5?`<div style="font-size:12px;color:var(--text3);margin-top:4px">+${t.entries.length-5} more entries</div>`:'';
    h+=`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><div style="font-weight:500;font-size:15px">${esc(t.name)}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">${t.entries.length} entries</div></div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn-sm" onclick="editTemplate('${t.id}')">Edit</button>
          <button class="btn-sm btn-danger" onclick="deleteTemplate('${t.id}')">Delete</button>
        </div>
      </div>${prev}${more}
    </div>`;
  });
  return h;
}

function newTemplate(){
  const t={id:uid(),name:'New Template',entries:[]};
  templates.push(t);save(KEYS.tpl,templates);
  editorEntries=[];editingTplId=t.id;render();
}

function editTemplate(id){
  const tpl=templates.find(t=>t.id===id);
  editorEntries=tpl?tpl.entries.map(e=>({...e})):[];
  editingTplId=id;render();
}

function deleteTemplate(id){
  openConfirm('Delete this template? This cannot be undone.',()=>{
    templates=templates.filter(t=>t.id!==id);save(KEYS.tpl,templates);render();
  });
}

// ── EDITOR ─────────────────────────────────────────────────────────────────
function rEditor(){
  const tpl=templates.find(t=>t.id===editingTplId);
  if(!tpl)return'';
  let rows=editorEntries.map((e,i)=>`
    <div class="entry-builder" id="eb-${e.id}">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="flex:0 0 95px">
          <label class="label" style="margin-bottom:4px">Time</label>
          <input type="text" placeholder="9:00 AM" value="${esc(e.time)}" data-id="${e.id}" data-field="time" style="padding:7px 10px"/>
        </div>
        <div style="flex:1">
          <label class="label" style="margin-bottom:4px">Description</label>
          <input type="text" placeholder="Activity..." value="${esc(e.desc)}" data-id="${e.id}" data-field="desc" style="padding:7px 10px"/>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer;flex-shrink:0">
          <input type="checkbox" ${e.tracked?'checked':''} data-id="${e.id}" data-field="tracked"/>
          Track this
        </label>
        ${e.tracked?`<input type="text" placeholder="Table name (e.g. Workouts)" value="${esc(e.trackTable)}" data-id="${e.id}" data-field="trackTable" style="flex:1;min-width:120px;padding:5px 10px;font-size:12px"/>` : ''}
        <div style="margin-left:auto;display:flex;gap:5px">
          <button class="btn-sm" onclick="moveEntry(${i},-1)" ${i===0?'disabled':''} style="padding:4px 9px">↑</button>
          <button class="btn-sm" onclick="moveEntry(${i},1)" ${i===editorEntries.length-1?'disabled':''} style="padding:4px 9px">↓</button>
          <button class="btn-sm btn-danger" onclick="removeEntry('${e.id}')" style="padding:4px 9px">✕</button>
        </div>
      </div>
    </div>`).join('');
  return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <button onclick="cancelEdit()">← Back</button>
    <div style="font-size:17px;font-weight:500">Edit template</div>
  </div>
  <div style="margin-bottom:18px">
    <label class="label" for="tpl-name-inp">Template name</label>
    <input id="tpl-name-inp" type="text" placeholder="e.g. Weekday, Weekend, Rest Day..." value="${esc(tpl.name)}"/>
  </div>
  <div style="font-size:14px;font-weight:500;margin-bottom:10px">Schedule entries</div>
  ${rows}
  <button class="add-entry-btn" onclick="addEntry()">+ Add entry</button>
  <button class="btn-primary btn-full" onclick="saveEditor()">Save template</button>`;
}

function flushEditorInputs(){
  editorEntries.forEach(e=>{
    const eb=document.getElementById('eb-'+e.id);
    if(!eb)return;
    eb.querySelectorAll('input,textarea').forEach(inp=>{
      const f=inp.dataset.field;
      if(!f)return;
      e[f]=inp.type==='checkbox'?inp.checked:inp.value;
    });
  });
  const ni=document.getElementById('tpl-name-inp');
  return ni?ni.value:null;
}

function addEntry(){
  flushEditorInputs();
  editorEntries.push({id:uid(),time:'',desc:'',tracked:false,trackTable:''});render();
}

function removeEntry(id){
  flushEditorInputs();
  editorEntries=editorEntries.filter(e=>e.id!==id);render();
}

function moveEntry(idx,dir){
  flushEditorInputs();
  const t=idx+dir;
  if(t<0||t>=editorEntries.length)return;
  [editorEntries[idx],editorEntries[t]]=[editorEntries[t],editorEntries[idx]];render();
}

function cancelEdit(){editorEntries=[];editingTplId=null;render();}

function saveEditor(){
  const name=flushEditorInputs();
  const tpl=templates.find(t=>t.id===editingTplId);
  if(tpl){if(name)tpl.name=name;tpl.entries=editorEntries.map(e=>({...e}));}
  editorEntries=[];editingTplId=null;save(KEYS.tpl,templates);render();
}

// ── LOGS ────────────────────────────────────────────────────────────────────
function rLogs(){
  const tables=Object.keys(tracked);
  const allTabs=['history',...tables];
  if(!allTabs.includes(activeLogTab))activeLogTab='history';
  const tabsH=allTabs.map(t=>`<button class="log-tab${activeLogTab===t?' active':''}" onclick="switchLogTab('${t}')">${t==='history'?'Day history':t.replace(/_/g,' ')}</button>`).join('');
  let content='';
  if(activeLogTab==='history'){
    if(!history.length){content=`<div class="empty">No history yet. Complete your first day!</div>`;}
    else history.forEach((d,i)=>{
      const tpl=templates.find(t=>t.id===d.templateId);
      const ents=tpl?tpl.entries:[];
      const done=ents.filter(e=>d.checks[e.id]).length;
      const pct=ents.length?Math.round(done/ents.length*100):0;
      const pctStyle=pct===100?'background:var(--success-bg);color:var(--success-text)':'background:var(--surface);color:var(--text2)';
      content+=`<div class="hist-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div style="font-weight:500;font-size:15px">${fmtDate(d.date)}</div>
          <div class="pct-badge" style="${pctStyle}">${pct}%</div>
        </div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:${d.goal||d.freeTime?'6px':'0'}">${esc(d.templateName)} · ${done}/${ents.length} items complete</div>
        ${d.goal?`<div style="font-size:13px;color:var(--text2)">Goal: <span style="color:var(--text)">${esc(d.goal)}</span></div>`:''}
        ${d.freeTime?`<div style="font-size:13px;color:var(--text2);margin-top:2px">Free time: <span style="color:var(--text)">${esc(d.freeTime)}</span></div>`:''}
      </div>`;
    });
  } else {
    const rows=tracked[activeLogTab]||[];
    const label=activeLogTab.replace(/_/g,' ');
    content=`<div style="font-size:13px;color:var(--text2);margin-bottom:12px;text-transform:capitalize">${label} — ${rows.length} entries</div>`;
    if(!rows.length){content+=`<div class="empty">No entries yet.</div>`;}
    else rows.forEach(e=>{
      content+=`<div class="hist-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <div style="font-weight:500;font-size:14px">${fmtDate(e.date)}</div>
          <div style="font-size:12px;color:var(--text3)">${esc(e.desc)}</div>
        </div>
        <div style="font-size:14px;color:var(--text2);line-height:1.6">${e.note?esc(e.note):'<em style="color:var(--text3)">No notes</em>'}</div>
      </div>`;
    });
  }
  return`<div class="log-tabs">${tabsH}</div>${content}`;
}

function switchLogTab(t){activeLogTab=t;render();}

// ── TRACK MODAL ─────────────────────────────────────────────────────────────
function openTrackModal(entryId){
  const tpl=templates.find(t=>t.id===dailyLog?.templateId);
  const entry=tpl?.entries.find(e=>e.id===entryId);
  if(!entry)return;
  const last=getLastTracked(entry.trackTable);
  const lastH=last?`<div style="background:var(--purple-light);border:0.5px solid var(--purple-border);border-radius:8px;padding:9px 12px;margin-bottom:14px">
    <div style="font-size:11px;font-weight:500;color:var(--purple);margin-bottom:4px">Last entry — ${fmtDate(last.date)}</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.5">${esc(last.note||'(no notes)')}</div>
  </div>`:'';
  document.getElementById('modal-box').innerHTML=`
    <div style="font-size:15px;font-weight:500;margin-bottom:3px">Log: ${esc(entry.desc)}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Saved to "${esc(entry.trackTable)}"</div>
    ${lastH}
    <textarea id="track-note" rows="4" placeholder="Notes for today's ${esc(entry.desc.toLowerCase())}..." style="margin-bottom:14px"></textarea>
    <div style="display:flex;gap:10px">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1;padding:9px 14px" onclick="saveTrack('${entry.id}','${esc(entry.trackTable)}','${esc(entry.desc)}')">Save log</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function saveTrack(entryId,table,desc){
  const note=document.getElementById('track-note')?.value||'';
  const key=tableKey(table);
  tracked[key]=[{id:uid(),date:todayStr(),desc:desc,note:note,ts:Date.now()},...(tracked[key]||[])].slice(0,200);
  save(KEYS.tracked,tracked);closeModal();render();
}

function openConfirm(msg,cb){
  confirmCb=cb;
  document.getElementById('modal-box').innerHTML=`
    <div style="font-size:15px;font-weight:500;margin-bottom:6px">Confirm</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5">${esc(msg)}</div>
    <div style="display:flex;gap:10px">
      <button style="flex:1" onclick="closeModal()">Cancel</button>
      <button style="flex:1;background:#A32D2D;border:none;color:#fff;border-radius:8px;padding:9px;font-size:13px;cursor:pointer;font-family:inherit" onclick="runConfirm()">Delete</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function runConfirm(){closeModal();if(confirmCb)confirmCb();confirmCb=null;}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOnBg(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

render();
</script>
</body>
</html>
